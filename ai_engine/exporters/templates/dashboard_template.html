<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${PROJECT_NAME} — Маркетинговый кабинет</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-width: 390px;
        line-height: 1.5;
      }
      header {
        background: #1a1a2e;
        color: #fff;
        padding: 16px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      header h1 {
        font-size: 20px;
        margin-bottom: 4px;
      }
      header .info {
        font-size: 13px;
        opacity: 0.8;
      }
      .progress-bar {
        background: #e0e0e0;
        border-radius: 8px;
        height: 12px;
        margin: 12px 0;
        overflow: hidden;
      }
      .progress-bar div {
        background: #4caf50;
        height: 100%;
        border-radius: 8px;
        transition: width 0.3s;
      }
      .stats {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 8px 0;
        font-size: 13px;
      }
      .stats span {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        padding: 4px 10px;
      }
      nav.tabs {
        display: flex;
        overflow-x: auto;
        gap: 2px;
        background: #fff;
        border-bottom: 2px solid #e0e0e0;
        position: sticky;
        top: 88px;
        z-index: 9;
      }
      nav.tabs button {
        flex-shrink: 0;
        padding: 10px 14px;
        border: none;
        background: none;
        font-size: 13px;
        cursor: pointer;
        color: #666;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
      }
      nav.tabs button.active {
        color: #1a1a2e;
        border-bottom-color: #4caf50;
        font-weight: 600;
      }
      main {
        padding: 16px;
        max-width: 960px;
        margin: 0 auto;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .card h3 {
        font-size: 16px;
        margin-bottom: 6px;
      }
      .card .meta {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
      }
      .card .steps {
        margin: 8px 0;
        padding-left: 20px;
        font-size: 14px;
      }
      .card .ready-text {
        background: #f0f4ff;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        margin: 8px 0;
        white-space: pre-wrap;
      }
      .card .kpi-row {
        font-size: 13px;
        color: #555;
        margin: 4px 0;
      }
      .card .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .btn {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn-done {
        background: #4caf50;
        color: #fff;
      }
      .btn-done.done {
        background: #388e3c;
      }
      .btn-redo {
        background: #ff9800;
        color: #fff;
      }
      .btn-fail {
        background: #f44336;
        color: #fff;
      }
      .btn-copy {
        background: #2196f3;
        color: #fff;
      }
      .no-data {
        text-align: center;
        color: #999;
        padding: 40px;
      }
      @media (max-width: 600px) {
        main {
          padding: 10px;
        }
        .card {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>${PROJECT_NAME}</h1>
      <div class="info">
        День ${CURRENT_DAY} из ${TOTAL_DAYS} — ${CURRENT_PHASE}
      </div>
      <div class="stats">
        <span>🔥 ${STREAK} дней</span><span>⭐ ${XP} XP</span
        ><span>📊 ${LEVEL}</span>
      </div>
      <div class="progress-bar">
        <div style="width:${PROGRESS_PERCENT}%"></div>
      </div>
    </header>
    <nav class="tabs">${TABS_HTML}</nav>
    <main>
      <div id="today" class="tab-content active">
        <h2>Миссии на сегодня (День ${TODAY_DAY})</h2>
        <p style="color: #666; margin-bottom: 12px">${TODAY_GOAL}</p>
        <div id="mission-cards"></div>
      </div>
      <div id="plan" class="tab-content">
        <h2>План 30 дней</h2>
        <div id="plan-grid"></div>
      </div>
      <div id="content" class="tab-content">
        <h2>Контент</h2>
        <div id="content-grid"></div>
      </div>
      <div id="ads" class="tab-content">
        <h2>Реклама</h2>
        <div id="ads-grid"></div>
      </div>
      <div id="sales" class="tab-content">
        <h2>Продажи</h2>
        <div id="sales-grid"></div>
      </div>
      <div id="clients" class="tab-content">
        <h2>Клиенты</h2>
        <div id="clients-grid"></div>
      </div>
      <div id="metrics" class="tab-content">
        <h2>Метрики</h2>
        <div id="metrics-grid"></div>
      </div>
      <div id="why" class="tab-content">
        <h2>Почему это работает</h2>
        <div id="why-grid"></div>
      </div>
    </main>
    <script>
      window.DATA=${DATA_JSON};window.MISSIONS=${MISSIONS_JSON};(function(){'use strict';var STORAGE_KEY='marketing_os_dashboard_v1';var state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"completed":{},"failed":{},"xp":0,"streak":0}');function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function getStatus(mid){return state.completed[mid]?'done':state.failed[mid]?'failed':'pending'}function setStatus(mid,st){if(st==='done'){state.completed[mid]=true;delete state.failed[mid];state.xp+=10}else if(st==='failed'){state.failed[mid]=true;delete state.completed[mid]}else{delete state.completed[mid];delete state.failed[mid]}save();renderToday()}function copyText(text){if(navigator.clipboard){navigator.clipboard.writeText(text).catch(function(){fallbackCopy(text)})}else{fallbackCopy(text)}}function fallbackCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}function renderToday(){var c=document.getElementById('mission-cards');var td=window.DATA.today;var ms=window.MISSIONS.filter(function(m){return m.day===td.day});if(!ms.length){c.innerHTML='<div class="no-data">Миссии на сегодня отсутствуют</div>';return}c.innerHTML=ms.map(function(m){var st=getStatus(m.mission_id);var dc=st==='done'?' done':'';return'<div class="card"><h3>'+esc(m.title)+'</h3><div class="meta">Сложность: '+m.difficulty+' | Время: '+m.estimated_time+' | XP: '+m.xp_reward+'</div><div class="steps">'+m.steps.map(function(s){return'<li>'+esc(s)+'</li>'}).join('')+'</div>'+(m.ready_text?'<div class="ready-text">'+esc(m.ready_text)+'</div>':'')+'<div class="kpi-row">CTA: '+esc(m.cta)+' | KPI: '+esc(m.metric)+' | Успех: '+esc(m.success_threshold)+'</div><div class="actions"><button class="btn btn-done'+dc+'" onclick="setStatus(\''+m.mission_id+'\',\'done\')">Сделано</button><button class="btn btn-redo" onclick="setStatus(\''+m.mission_id+'\',\'redo\')">Переделать</button><button class="btn btn-fail" onclick="setStatus(\''+m.mission_id+'\',\'failed\')">Не сработало</button>'+(m.ready_text?'<button class="btn btn-copy" onclick="copyText(\''+esc_js(m.ready_text)+'\')">Копировать</button>':'')+'</div></div>'}).join('')}function renderPlan(){var c=document.getElementById('plan-grid');c.innerHTML=window.DATA.days.map(function(d){return'<div class="card"><h3>День '+d.day+' — '+esc(d.phase)+'</h3><p>'+esc(d.goal)+'</p><div class="meta">Миссий: '+d.mission_count+' | Время: '+esc(d.estimated_time)+'</div></div>'}).join('')}function renderContent(){var c=document.getElementById('content-grid');var t=window.DATA.content_tasks;if(!t.length){c.innerHTML='<div class="no-data">Контент отсутствует</div>';return}c.innerHTML=t.map(function(t){return'<div class="card"><h3>'+esc(t.title)+'</h3><div class="meta">День '+t.day+' | '+esc(t.content_format)+'</div><div class="ready-text">'+esc(t.ready_text)+'</div><button class="btn btn-copy" onclick="copyText(\''+esc_js(t.ready_text)+'\')">Копировать</button></div>'}).join('')}function renderAds(){var c=document.getElementById('ads-grid');var t=window.DATA.ads_tasks;if(!t.length){c.innerHTML='<div class="no-data">Реклама отсутствует</div>';return}c.innerHTML=t.map(function(t){return'<div class="card"><h3>Реклама: День '+t.day+'</h3><div class="meta">Платформа: '+esc(t.platform)+' | Бюджет: '+esc(t.budget)+' | KPI: '+esc(t.kpi)+'</div></div>'}).join('')}function renderSales(){var c=document.getElementById('sales-grid');var t=window.DATA.sales_tasks;if(!t.length){c.innerHTML='<div class="no-data">Скрипты продаж отсутствуют</div>';return}c.innerHTML=t.map(function(t){return'<div class="card"><h3>'+esc(t.scenario)+'</h3><p>'+esc(t.message)+'</p><div class="actions"><button class="btn btn-copy" onclick="copyText(\''+esc_js(t.message)+'\')">Копировать</button></div></div>'}).join('')}function renderClients(){document.getElementById('clients-grid').innerHTML='<div class="no-data">Для кого делается маркетинг</div>'}function renderMetrics(){var c=document.getElementById('metrics-grid');var k=window.DATA.kpi_tasks;if(!k||!k.length){c.innerHTML='<div class="no-data">Метрики отсутствуют</div>';return}c.innerHTML=k.map(function(k){return'<div class="card"><h3>'+esc(k.action)+'</h3><div class="meta">Metric: '+esc(k.metric)+' | Success: '+esc(k.success_threshold)+'</div></div>'}).join('')}function renderWhy(){document.getElementById('why-grid').innerHTML='<div class="card"><p>Эта система построена на основе глубокого маркетингового анализа: аватары клиентов, их боли, триггеры и офферы. Каждая миссия ведёт к конкретному бизнес-результату.</p></div>'}function esc(s){if(!s)return'';return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"')}function esc_js(s){if(!s)return'';return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n')}function switchTab(tabId){document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});document.querySelectorAll('.tabs button').forEach(function(el){el.classList.remove('active')});var tab=document.getElementById(tabId);if(tab)tab.classList.add('active');var btn=document.querySelector('.tabs button[data-tab="'+tabId+'"]');if(btn)btn.classList.add('active')}document.addEventListener('DOMContentLoaded',function(){renderToday();renderPlan();renderContent();renderAds();renderSales();renderClients();renderMetrics();renderWhy();document.querySelectorAll('.tabs button').forEach(function(btn){btn.addEventListener('click',function(){switchTab(this.dataset.tab)})})})})();
    </script>
  </body>
</html>
