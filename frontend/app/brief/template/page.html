<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing OS v4 — Шаблон брифа</title>
    <link rel="stylesheet" href="../../../css/styles.css" />
    <script src="../../../js/api.js" defer></script>
  </head>
  <body data-mode="workspace">
    <div class="app-shell">
      <aside class="app-sidebar">
        <div class="sidebar-logo">Marketing OS v4</div>
        <ul class="sidebar-nav">
          <li><a href="/" onclick="return smartNav('/', '../../page.html')">Главный экран</a></li>
          <li><a href="/app/projects" onclick="return smartNav('/app/projects', '../../projects/page.html')">Мои проекты</a></li>
          <li><a href="/app/brief/new" onclick="return smartNav('/app/brief/new', '../new/page.html')">Заполнить бриф</a></li>
          <li><a href="/app/brief/upload" onclick="return smartNav('/app/brief/upload', '../upload/page.html')">Загрузить бриф</a></li>
          <li><a class="active" href="/app/brief/template" onclick="return smartNav('/app/brief/template', 'page.html')">Скачать бриф</a></li>

        <div class="sidebar-status"><span class="dot"></span>Шаблон клиента</div>
      </aside>
      <main class="app-content">
        <div class="section-header">
          <div>
            <div class="eyebrow">Бриф</div>
            <h1 class="page-title">Скачать бриф</h1>
            <p class="page-subtitle">Передайте клиенту готовый шаблон для заполнения.</p>
          </div>
        </div>
        <section class="card">
          <div class="card-title">Шаблон</div>
          <p class="card-subtitle">HTML-версия брифа для отправки клиенту.</p>
          <div class="brief-actions" style="margin-top: var(--s4);">
            <button class="btn btn-primary" type="button">Скачать HTML</button>
            <a class="btn btn-secondary" href="/app/brief/new" onclick="return smartNav('/app/brief/new', '../new/page.html')">Заполнить вручную</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
