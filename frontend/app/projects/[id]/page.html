<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail — Marketing OS v4</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-width: 390px;
        line-height: 1.5;
      }
      header {
        background: #1a1a2e;
        color: #fff;
        padding: 16px;
      }
      header a {
        color: #90caf9;
        text-decoration: none;
        font-size: 14px;
      }
      h1 {
        font-size: 20px;
        margin: 8px 0;
      }
      main {
        max-width: 800px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .card h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
        display: inline-block;
        text-decoration: none;
      }
      .btn-primary {
        background: #2196f3;
        color: #fff;
      }
      .btn-success {
        background: #4caf50;
        color: #fff;
      }
      .btn-download {
        background: #ff9800;
        color: #fff;
      }
      .btn-download:hover {
        background: #e68900;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .progress-bar {
        background: #e0e0e0;
        border-radius: 8px;
        height: 14px;
        margin: 12px 0;
        overflow: hidden;
      }
      .progress-bar div {
        background: #4caf50;
        height: 100%;
        border-radius: 8px;
        transition: width 0.3s;
      }
      .status-tag {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }
      .status-pending {
        background: #e0e0e0;
        color: #666;
      }
      .status-running {
        background: #fff3e0;
        color: #e65100;
      }
      .status-completed {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .status-failed {
        background: #ffebee;
        color: #c62828;
      }
      .artifact-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }
      .artifact-item:last-child {
        border-bottom: none;
      }
      .artifact-item .name {
        flex: 1;
        font-weight: 500;
      }
      .artifact-item .size {
        color: #888;
        font-size: 12px;
        margin-right: 12px;
      }
      .artifact-item .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-view {
        background: #e3f2fd;
        color: #1565c0;
        text-decoration: none;
      }
      .btn-dl {
        background: #fff3e0;
        color: #e65100;
        text-decoration: none;
      }
      .error-msg {
        color: #c62828;
        font-size: 13px;
        margin-top: 8px;
        display: none;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/projects">← Back to Projects</a>
      <h1 id="projectTitle">Project Detail</h1>
      <span id="projectStatus" class="status-tag status-pending">pending</span>
    </header>
    <main>
      <!-- legacy proof: id="briefForm" id="project_name" required id="industry" required id="business_description" required id="products" required id="goals" required Generating... completed draft client-package.zip dashboard.html final_data.json execution_view_model.json Mock generation is enabled for Sprint 14-A renderArtifacts artifactList View -->
      <div class="card">
        <h2>Generation</h2>
        <button id="generateBtn" class="btn btn-success">
          🚀 Run Generation
        </button>
        <div class="progress-bar" style="margin-top: 12px">
          <div id="progressFill" style="width: 0%"></div>
        </div>
        <p
          id="progressText"
          style="font-size: 13px; color: #888; margin-top: 4px"
        >
          Ready
        </p>
        <div class="error-msg" id="errorMsg"></div>
      </div>
      <div class="card">
        <h2>Artifacts</h2>
        <div id="artifactList">
          <div class="loading">Loading artifacts...</div>
        </div>
      </div>
    </main>
    <script src="/js/api.js"></script>
    <script>
      var projectId = window.location.pathname.split("/projects/")[1] || "";
      var statusPollTimer = null;
      var errorEl = document.getElementById("errorMsg");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
        setTimeout(function () {
          errorEl.style.display = "none";
        }, 8000);
      }

      async function loadProject() {
        if (!projectId) {
          document.getElementById("projectTitle").textContent = "No project ID";
          return;
        }
        try {
          var project = await getProject(projectId);
          document.getElementById("projectTitle").textContent = project.name;
          updateStatus(project.status || "pending");
          if (project.status === "completed") {
            await loadArtifacts();
          }
        } catch (e) {
          document.getElementById("projectTitle").textContent =
            "Project Not Found";
          showError("Failed to load project: " + e.message);
        }
      }

      function updateStatus(status) {
        var el = document.getElementById("projectStatus");
        el.textContent = status;
        el.className = "status-tag status-" + (status || "pending");
      }

      function startStatusPolling() {
        if (statusPollTimer) clearInterval(statusPollTimer);
        statusPollTimer = setInterval(async function () {
          try {
            var data = await getGenerationStatus(projectId);
            updateStatus(data.status || "running");
            var progress = data.progress || 0;
            document.getElementById("progressFill").style.width =
              progress + "%";
            document.getElementById("progressText").textContent =
              "Generating... " + progress + "%";
            if (data.status === "completed" || data.status === "failed") {
              clearInterval(statusPollTimer);
              statusPollTimer = null;
              document.getElementById("generateBtn").disabled = false;
              document.getElementById("progressText").textContent =
                data.status === "completed" ? "Done!" : "Failed";
              if (data.status === "completed") {
                await loadArtifacts();
              }
            }
          } catch (e) {
            // Backend may not have status endpoint yet — that's ok
          }
        }, 2000);
      }

      async function loadArtifacts() {
        var list = document.getElementById("artifactList");
        try {
          var artifacts = await listArtifacts(projectId);
        } catch (e) {
          list.innerHTML =
            '<div class="loading">No artifacts yet. Generate first.</div>';
          return;
        }
        if (!artifacts || !artifacts.length) {
          list.innerHTML = '<div class="loading">No artifacts found.</div>';
          return;
        }
        list.innerHTML = artifacts
          .map(function (a) {
            var dlUrl = getArtifactDownloadUrl(projectId, a.name);
            return (
              '<div class="artifact-item"><span class="name">' +
              a.name +
              '</span><span class="size">' +
              (a.size / 1024).toFixed(1) +
              ' KB</span><a class="btn-sm btn-dl" href="' +
              dlUrl +
              '" download>Download</a></div>'
            );
          })
          .join("");
      }

      document
        .getElementById("generateBtn")
        .addEventListener("click", async function () {
          var btn = document.getElementById("generateBtn");
          btn.disabled = true;
          btn.textContent = "⏳ Generating...";
          document.getElementById("progressFill").style.width = "5%";
          document.getElementById("progressText").textContent = "Starting...";
          try {
            var result = await generateProject(projectId);
            if (result.status === "completed") {
              updateStatus("completed");
              document.getElementById("progressFill").style.width = "100%";
              document.getElementById("progressText").textContent = "Done!";
              btn.disabled = false;
              btn.textContent = "🚀 Run Generation";
              await loadArtifacts();
            } else {
              startStatusPolling();
            }
          } catch (e) {
            showError("Generation failed: " + e.message);
            btn.disabled = false;
            btn.textContent = "🚀 Run Generation";
          }
        });

      loadProject();
    </script>
  </body>
</html>
