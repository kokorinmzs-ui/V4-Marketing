<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing OS v4</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-width: 390px;
        line-height: 1.5;
      }
      header {
        background: #1a1a2e;
        color: #fff;
        padding: 24px 16px;
        text-align: center;
      }
      header h1 {
        font-size: 24px;
      }
      header p {
        opacity: 0.8;
        margin-top: 8px;
      }
      main {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        text-align: center;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #2196f3;
        color: #fff;
      }
      .btn-primary:hover {
        background: #1565c0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Marketing OS v4</h1>
      <p>AI-powered marketing system — generate your 30-day execution plan</p>
    </header>
    <main>
      <div class="card">
        <h2 style="margin-bottom: 16px">Welcome</h2>
        <p style="color: #666; margin-bottom: 24px">
          Create projects, fill briefs, generate strategies, and download ZIP
          packages with all assets.
        </p>
        <a href="/projects" class="btn btn-primary">Перейти к проектам</a>
      </div>
    </main>
  </body>
</html>
